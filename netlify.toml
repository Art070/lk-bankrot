[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# React Router handles these client-side routes. Netlify must always serve the
# application shell instead of returning its own 404 page on a direct visit.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
